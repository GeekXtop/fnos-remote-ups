name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build binary and Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libuv1-dev

      - name: Build binary
        run: |
          make INCLUDES="-I./include" LIBS="-lpthread -luv"

      - name: Package binary
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG=fnos-remote-ups-${VERSION}
          mkdir -p /tmp/${PKG}
          cp dist/fnos-remote-ups /tmp/${PKG}/
          cp README.md /tmp/${PKG}/
          tar -czf dist/${PKG}.tar.gz -C /tmp ${PKG}
          echo "PKG_FILE=dist/${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build \
            -f ./docker/Dockerfile.github \
            -t fnos-remote-ups:${VERSION} \
            .

      - name: Export Docker image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          IMG_FILE=dist/fnos-remote-ups-${VERSION}.img.gz
          docker image save fnos-remote-ups:${VERSION} | gzip > ${IMG_FILE}
          echo "IMG_FILE=${IMG_FILE}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.PKG_FILE }}
            ${{ env.IMG_FILE }}
